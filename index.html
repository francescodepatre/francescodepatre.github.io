<!DOCTYPE html>
<html lang="en">
<head>

  <!-- ── Basic ── -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- title / description / theme-color injected by main.js from data.json -->

  <!-- ── Fonts ── -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- ── Favicons ── -->
  <link rel="icon" type="image/x-icon"    href="favicon.ico">
  <link rel="icon" type="image/svg+xml"   href="favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon"            href="apple-touch-icon.png">
  <link rel="manifest"                    href="site.webmanifest">

  <!-- ── Styles ── -->
  <link rel="stylesheet" href="css/styles.css">

</head>
<body>

  <!-- ══ BOOT SCREEN — populated by JS ══ -->
  <div id="boot-screen" aria-hidden="true"></div>

  <!-- ══ NOISE OVERLAY ══ -->
  <div class="noise"></div>

  <!-- ══ HEADER ══ -->
  <header>
    <div class="nav-inner">
      <a href="#intro" class="nav-logo" id="nav-logo"></a>
      <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">[MENU]</button>
      <nav>
        <ul id="navList">
          <li><a href="#intro">init</a></li>
          <li><a href="#about">about</a></li>
          <li><a href="#experience">log</a></li>
          <li><a href="#works">projects</a></li>
          <li><a href="#contact">connect</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- ══ STATUS BAR — populated by JS ══ -->
  <div class="status-bar">
    <span id="status-left"></span>
    <span id="clock">--:--:--</span>
  </div>

  <!-- ══ MAIN CONTENT ══ -->
  <div id="crt-wrap">

    <!-- ── INTRO ── -->
    <section id="intro">
      <div class="term-win" style="max-width:680px">
        <div class="term-titlebar">
          <span class="term-dot td-red"></span>
          <span class="term-dot td-yel"></span>
          <span class="term-dot td-grn"></span>
          <span style="margin-left:8px">bash — ~/portfolio — 80×24</span>
        </div>
        <div class="term-body">
          <div class="prompt-line" id="intro-prompt"></div>
          <h1 class="intro-name glow" id="intro-name"></h1>
          <div class="intro-desc" id="intro-desc"></div>
          <div class="intro-tags" id="intro-tags"></div>
          <ul class="intro-social" id="intro-social"></ul>
        </div>
      </div>
      <div class="scroll-hint">▼ &nbsp;scroll to explore &nbsp; ▼</div>
    </section>

    <!-- ── ABOUT ── -->
    <section id="about">
      <div class="section-label">About</div>
      <div class="about-grid">

        <div class="term-win">
          <div class="term-titlebar">
            <span class="term-dot td-red"></span>
            <span class="term-dot td-yel"></span>
            <span class="term-dot td-grn"></span>
            <span style="margin-left:8px">cat about.txt</span>
          </div>
          <div class="term-body about-bio" id="about-bio"></div>
        </div>

        <div>
          <div class="term-win">
            <div class="term-titlebar">
              <span class="term-dot td-red"></span>
              <span class="term-dot td-yel"></span>
              <span class="term-dot td-grn"></span>
              <span style="margin-left:8px">ls -la skills/</span>
            </div>
            <div class="term-body">
              <div class="skills-grid" id="skills-grid"></div>
            </div>
          </div>
        </div>

      </div>
    </section>

    <!-- ── EXPERIENCE & EDUCATION ── -->
    <section id="experience">
      <div class="section-label">System Log</div>
      <div class="timelines">
        <div class="tl-section">
          <h3>Experience</h3>
          <div class="timeline" id="timeline-experience"></div>
        </div>
        <div class="tl-section">
          <h3>Education</h3>
          <div class="timeline" id="timeline-education"></div>
        </div>
      </div>
    </section>

    <!-- ── WORKS ── -->
    <section id="works">
      <div class="section-label">Projects</div>
      <p id="works-header" style="margin: 0.5rem 0 2rem; color: rgba(0,255,65,0.4); font-size:13px;"></p>
      <div class="works-grid" id="works-grid"></div>
    </section>

    <!-- ── CONTACT ── -->
    <section id="contact">
      <div class="section-label">Connect</div>
      <div class="contact-big glow" id="contact-heading"></div>
      <p id="contact-subtext" style="color: rgba(0,255,65,0.4); font-size:13px; max-width:480px; line-height:1.8;"></p>
      <div class="contact-grid">
        <div class="contact-block">
          <h4>// Email</h4>
          <a id="contact-email" href="#"></a>
        </div>
        <div class="contact-block">
          <h4>// Channels</h4>
          <div id="contact-social"></div>
        </div>
      </div>
      <a id="contact-cta" href="#" class="btn-terminal" style="margin-top:2.5rem; font-size:14px;"></a>
    </section>

    <!-- ── FOOTER ── -->
    <footer>
      <span id="footer-copyright"></span>
      <span>SYSTEM UPTIME: <span id="uptime">00:00:00</span></span>
      <span id="footer-build"></span>
    </footer>

  </div><!-- /crt-wrap -->

  <!-- ── Scripts ── -->
  <script src="js/main.js"></script>

</body>
</html>
