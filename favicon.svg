<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" fill="#030a06" rx="4"/>
  <!-- Scanlines subtle -->
  <rect width="32" height="1" y="8"  fill="rgba(0,0,0,0.25)"/>
  <rect width="32" height="1" y="16" fill="rgba(0,0,0,0.25)"/>
  <rect width="32" height="1" y="24" fill="rgba(0,0,0,0.25)"/>
  <!-- F monogram, terminal style -->
  <g filter="url(#glow)" fill="#00ff41">
    <!-- F stem -->
    <rect x="8" y="7" width="3" height="18" rx="0.5"/>
    <!-- F top bar -->
    <rect x="8" y="7" width="14" height="3" rx="0.5"/>
    <!-- F middle bar -->
    <rect x="8" y="14" width="10" height="2.5" rx="0.5"/>
  </g>
  <!-- Cursor blink block -->
  <rect x="19" y="22" width="4" height="3" fill="#ffb000" opacity="0.9" rx="0.3"/>
</svg>
